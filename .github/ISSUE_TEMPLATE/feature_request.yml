name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like?
      placeholder: Describe the feature...
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: What problem would this solve?
      placeholder: Describe the problem this would solve...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds?
    validations:
      required: false
