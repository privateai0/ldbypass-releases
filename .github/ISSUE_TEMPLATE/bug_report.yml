name: Bug Report
description: Report a bug in LDBypass
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open LDBypass
        2. Press ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: macos
    attributes:
      label: macOS Version
      options:
        - Sequoia 15
        - Sonoma 14
        - Ventura 13
        - Monterey 12
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LDBypass Version
      placeholder: e.g. 1.1.0
    validations:
      required: true
  - type: dropdown
    id: proctor
    attributes:
      label: Proctoring Software
      options:
        - LockDown Browser
        - Proctorio
        - ProctorU
        - Honorlock
        - ExamSoft
        - Safe Exam Browser
        - None / Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, logs, or anything else relevant
    validations:
      required: false
