name: Bug Report
description: Report a bug or issue with LDBypass
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open LDBypass
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: dropdown
    id: macos-version
    attributes:
      label: macOS Version
      description: Which version of macOS are you running?
      options:
        - Sequoia 15
        - Sonoma 14
        - Ventura 13
        - Monterey 12
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Chip
      description: What chip does your Mac use?
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: input
    id: ldbypass-version
    attributes:
      label: LDBypass Version
      description: Which version of LDBypass are you using? (e.g., 1.2.0)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: proctoring-software
    attributes:
      label: Proctoring Software
      description: Which proctoring software were you using?
      options:
        - LockDown Browser
        - Proctorio
        - ProctorU
        - Honorlock
        - ExamSoft
        - Safe Exam Browser
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or log output about the issue here.
      placeholder: Any additional information...
    validations:
      required: false
